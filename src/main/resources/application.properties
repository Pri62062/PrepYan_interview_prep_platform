spring.application.name=interview-prep

# ==============================
# DATABASE \u2014 PostgreSQL (Render)
# ==============================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================
# JPA / HIBERNATE (FAST STARTUP FIX)
# ==============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# \u274C OLD: update (slow)
# \u2705 NEW: none (FAST)
spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=false

# \u2705 FAST STARTUP FIXES
spring.main.lazy-initialization=true
spring.jpa.defer-datasource-initialization=true
spring.datasource.hikari.initialization-fail-timeout=0

# Memory optimization
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ==============================
# HIKARI CONNECTION POOL (LOW RAM)
# ==============================
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=180000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.leak-detection-threshold=60000

# ==============================
# TOMCAT SERVER (LOW MEMORY)
# ==============================
server.tomcat.threads.max=10
server.tomcat.threads.min-spare=2
server.tomcat.accept-count=20
server.tomcat.connection-timeout=60000

# ==============================
# REQUEST TIMEOUT (AI CALLS SAFE)
# ==============================
spring.mvc.async.request-timeout=90000

# ==============================
# GROQ API KEY
# ==============================
groq.api.key=${GROQ_API_KEY}

# ==============================
# JSON SETTINGS
# ==============================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ==============================
# LOGGING (LOW MEMORY)
# ==============================
logging.level.root=WARN
logging.level.org.springframework.web=INFO
logging.level.com.prep=INFO
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN

# ==============================
# DISABLE UNUSED FEATURES
# ==============================
spring.jmx.enabled=false
spring.devtools.restart.enabled=false

# ==============================
# PORT FIX (CRITICAL FOR RENDER)
# ==============================
server.port=${PORT:8080}