spring.application.name=interview-prep

# 
#  DATABASE  PostgreSQL (Render)

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

#  NONE  don't scan/alter schema on startup (saves 30+ seconds)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.jdbc.batch_size=10


#  LAZY INIT  beans load on first request
#  not at startup  cuts 20-30 seconds off boot

spring.main.lazy-initialization=true

#  HIKARI  minimal pool for free tier

spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=180000
spring.datasource.hikari.max-lifetime=600000



spring.datasource.hikari.initialization-fail-timeout=-1


server.tomcat.threads.max=8
server.tomcat.threads.min-spare=1
server.tomcat.accept-count=10
server.tomcat.connection-timeout=60000
server.port=${PORT:8080}


spring.mvc.async.request-timeout=90000
groq.api.key=${GROQ_API_KEY}



spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false


logging.level.root=WARN
logging.level.com.prep=INFO
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN


spring.jmx.enabled=false
spring.devtools.restart.enabled=false
spring.mvc.pathmatch.use-suffix-pattern=false